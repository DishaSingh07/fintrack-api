spring.application.name=fintrack

# ===============================
# Database (PostgreSQL - Neon)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# Flyway (disabled for now)
# ===============================
spring.flyway.enabled=false

# ===============================
# Server
# ===============================
server.servlet.context-path=/api/v1.0
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ===============================
# Mail (Brevo)
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME:dev@localhost}
spring.mail.password=${MAIL_PASSWORD:dev-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${MAIL_FROM_ADDRESS:no-reply@fintrack.local}

# ===============================
# Security
# ===============================
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
jwt.expiration-ms=86400000

# ===============================
# App URLs
# ===============================
app.frontend.url=${FINTRACK_FRONTEND_URL:http://localhost:3000}
app.activation.url=${APP_BACKEND_URL:http://localhost:8080}

# ===============================
# Swagger (disabled in prod)
# ===============================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ===============================
# Logging
# ===============================
logging.level.org.springframework=WARN
logging.level.com.disha.fintrack=INFO
